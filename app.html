<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой Донос*</title>

  <!-- Подключение Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Подключение Babel для обработки JSX в браузере -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Настройка импортов (Import Map) для загрузки библиотек прямо в браузере -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>

  <style>
    /* Скрытие полосы прокрутки для красоты */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-gray-200">
  <div id="root"></div>

  <!-- Основной код приложения -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { User, Plus, Minus, Locate, Camera, X, Search, ChevronUp, ChevronDown, MapPin, Navigation, ThumbsUp, MessageCircle, Image as ImageIcon, Layers, CheckSquare, Square, Clock } from 'lucide-react';

    // --- КОНСТАНТЫ И МОКИ ---

    const CATEGORIES = [
      { id: 'road', name: 'Дороги', icon: '🚧', color: '#FF9500' },
      { id: 'trash', name: 'Мусор', icon: '🗑️', color: '#FF3B30' },
      { id: 'light', name: 'Свет', icon: '💡', color: '#FFCC00' },
      { id: 'park', name: 'Парки', icon: '🌳', color: '#34C759' },
      { id: 'house', name: 'ЖКХ', icon: '🏠', color: '#5856D6' },
    ];

    const MOCK_REPORTS = [
      {
        id: 1, lat: 45, long: 30,
        title: 'Яма во дворе',
        desc: 'Огромная яма при въезде во двор, машины цепляют дном.',
        address: 'ул. Пушкина, д. 10',
        status: 'pending', category: 'road', date: '12.10.2023', author: 'Иван П.', likes: 5, comments: 2,
        image: 'https://images.unsplash.com/photo-1515162816999-a0c47dc192f7?auto=format&fit=crop&q=80&w=400'
      },
      {
        id: 4, lat: 45, long: 30,
        title: 'Сломан забор',
        desc: 'Дети выломали секцию забора, опасно.',
        address: 'ул. Пушкина, д. 10',
        status: 'pending', category: 'house', date: '14.10.2023', author: 'Мария В.', likes: 2, comments: 1,
        image: null
      },
      {
        id: 2, lat: 60, long: 60,
        title: 'Не горит фонарь',
        desc: 'Вдоль аллеи не работает освещение уже неделю.',
        address: 'Парк Горького',
        status: 'solved', category: 'light', date: '10.10.2023', author: 'Анна С.', likes: 12, comments: 0,
        image: 'https://images.unsplash.com/photo-1550523117-9c5224329249?auto=format&fit=crop&q=80&w=400'
      },
      {
        id: 3, lat: 25, long: 75,
        title: 'Мусор не вывозят',
        desc: 'Контейнеры переполнены, запах на весь район.',
        address: 'пр. Ленина, 42',
        status: 'progress', category: 'trash', date: '09.10.2023', author: 'Дмитрий К.', likes: 8, comments: 4,
        image: 'https://images.unsplash.com/photo-1530587191325-3db32d826c18?auto=format&fit=crop&q=80&w=400'
      },
    ];

    // --- КОМПОНЕНТЫ UI ---

    const Button = ({ onPress, title, variant = 'primary', className = '', icon: Icon, disabled }) => {
      const baseStyle = "py-3 px-5 rounded-xl font-semibold text-center transition-all active:scale-95 flex items-center justify-center gap-2";
      const variants = {
        primary: "bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:bg-gray-300 disabled:shadow-none",
        secondary: "bg-gray-100 text-gray-900 hover:bg-gray-200",
        outline: "border-2 border-blue-600 text-blue-600 bg-transparent hover:bg-blue-50"
      };

      return (
        <button className={`${baseStyle} ${variants[variant]} ${className}`} onClick={disabled ? null : onPress} disabled={disabled}>
          {Icon && <Icon size={18} />}
          {title}
        </button>
      );
    };

    const Input = ({ placeholder, value, onChangeText, secureTextEntry, multiline }) => {
      const baseStyle = "w-full bg-gray-50 p-4 rounded-xl text-base mb-3 border border-transparent focus:border-blue-500 focus:bg-white transition-all outline-none text-gray-900 placeholder-gray-400";
      return multiline ? (
        <textarea
          className={`${baseStyle} min-h-[100px] resize-none`}
          placeholder={placeholder}
          value={value}
          onChange={(e) => onChangeText(e.target.value)}
        />
      ) : (
        <input
          type={secureTextEntry ? "password" : "text"}
          className={baseStyle}
          placeholder={placeholder}
          value={value}
          onChange={(e) => onChangeText(e.target.value)}
        />
      );
    };

    const Badge = ({ status }) => {
      const styles = {
        solved: { bg: 'bg-green-100', text: 'text-green-700', label: 'Решено' },
        progress: { bg: 'bg-orange-100', text: 'text-orange-700', label: 'В работе' },
        pending: { bg: 'bg-gray-100', text: 'text-gray-600', label: 'На рассмотрении' }
      };
      const current = styles[status] || styles.pending;

      return (
        <div className={`px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide ${current.bg} ${current.text}`}>
          {current.label}
        </div>
      );
    };

    // --- ЭКРАНЫ ---

    // 1. Авторизация
    const AuthScreen = ({ onLogin }) => {
      const [isLogin, setIsLogin] = useState(true);
      const [agreed, setAgreed] = useState(false);

      return (
        <div className="flex flex-col h-full bg-white p-6 justify-center animate-in fade-in duration-500">
          <div className="flex flex-col items-center mb-8">
            <div className="w-24 h-24 rounded-full bg-blue-50 flex items-center justify-center mb-6 text-5xl shadow-sm">🏙️</div>
            <h1 className="text-3xl font-bold text-gray-900 mb-2">Мой Донос*</h1>
            <p className="text-gray-500 text-center px-4">Сделаем наш город лучше вместе</p>
          </div>
          <div className="w-full max-w-sm mx-auto space-y-2">
            {!isLogin && <Input placeholder="Имя пользователя" onChangeText={() => { }} />}
            <Input placeholder="Email" onChangeText={() => { }} />
            <Input placeholder="Пароль" secureTextEntry onChangeText={() => { }} />

            {!isLogin && (
              <React.Fragment>
                <Input placeholder="Повторите пароль" secureTextEntry onChangeText={() => { }} />
                <div className="flex items-center gap-3 py-2 cursor-pointer" onClick={() => setAgreed(!agreed)}>
                  {agreed ? <CheckSquare className="text-blue-600" size={20} /> : <Square className="text-gray-400" size={20} />}
                  <span className="text-sm text-gray-600 select-none">Я согласен с правилами приложения</span>
                </div>
              </React.Fragment>
            )}

            {isLogin && (
              <div className="flex justify-end pb-2">
                <button className="text-sm text-blue-600 font-medium" onClick={() => alert('Ссылка на восстановление отправлена')}>Забыли пароль?</button>
              </div>
            )}

            <div className="pt-2">
              <Button
                title={isLogin ? "Войти" : "Зарегистрироваться"}
                onPress={onLogin}
                className="w-full"
                disabled={!isLogin && !agreed}
              />
            </div>

            <button onClick={() => setIsLogin(!isLogin)} className="w-full py-4 text-blue-600 font-medium">{isLogin ? "Нет аккаунта? Создать" : "Уже есть аккаунт? Войти"}</button>
          </div>
        </div>
      );
    };

    // 2. Карта
    const MockMap = ({ markers, onMapPress, onMarkerPress, zoomLevel }) => {
      const clusters = useMemo(() => {
        const grouped = {};
        markers.forEach(m => {
          const key = `${m.lat}-${m.long}`;
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(m);
        });
        return Object.values(grouped);
      }, [markers]);

      const handleMapClick = (e) => {
        if (e.target.closest('.marker-btn')) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        onMapPress({ x, y });
      };

      return (
        <div className="relative w-full h-full bg-[#E5E5E5] overflow-hidden cursor-crosshair group select-none">
          <div
            className="w-full h-full relative transition-transform duration-300 ease-out"
            style={{ transform: `scale(${zoomLevel})` }}
            onClick={handleMapClick}
          >
            <img
              src="https://img.freepik.com/premium-vector/abstract-flat-map-city-plan-town-detailed-city-map_257312-609.jpg?w=1060"
              className="absolute inset-0 w-full h-full object-cover"
              alt="Street Map"
            />
            <div className="absolute inset-0 opacity-10 pointer-events-none"
              style={{ backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '30px 30px' }}
            />

            {clusters.map((cluster, i) => {
              const mainReport = cluster[0];
              const count = cluster.length;
              const catColor = CATEGORIES.find(c => c.id === mainReport.category)?.color || 'red';

              return (
                <button
                  key={i}
                  className="marker-btn absolute transform -translate-x-1/2 -translate-y-1/2 hover:scale-110 transition-transform hover:z-50 focus:outline-none"
                  style={{
                    left: mainReport.long + '%',
                    top: mainReport.lat + '%',
                    transform: `translate(-50%, -50%) scale(${1 / zoomLevel})`
                  }}
                  onClick={(e) => { e.stopPropagation(); onMarkerPress(cluster); }}
                >
                  <div className="relative">
                    {count > 1 ? (
                      <div className="relative group/cluster">
                        <div className="w-10 h-10 rounded-full bg-blue-600 border-2 border-white shadow-lg flex items-center justify-center text-white font-bold transition-transform">
                          {count}
                        </div>
                        <div className="absolute -bottom-1 -right-1 w-5 h-5 bg-white rounded-full flex items-center justify-center shadow-sm">
                          <Layers size={12} className="text-blue-600" />
                        </div>
                      </div>
                    ) : (
                      <React.Fragment>
                        <MapPin size={40} color={catColor} fill={catColor} className="drop-shadow-md text-opacity-90" />
                        <div className="absolute top-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rounded-full flex items-center justify-center">
                          <span className="text-[8px] font-bold">{CATEGORIES.find(c => c.id === mainReport.category)?.icon}</span>
                        </div>
                      </React.Fragment>
                    )}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    const ReportCard = ({ report, onClick }) => (
      <div
        onClick={onClick}
        className="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow cursor-pointer flex flex-col gap-3"
      >
        <div className="flex items-center gap-2 text-xs text-gray-500">
          <div className="w-6 h-6 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 font-bold">
            {report.author.charAt(0)}
          </div>
          <span className="font-medium text-gray-900">{report.author}</span>
          <span>•</span>
          <span>{report.date}</span>
        </div>

        <div className="flex gap-3">
          <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-xl bg-gray-50 self-start">
            {CATEGORIES.find(c => c.id === report.category)?.icon}
          </div>

          <div className="flex-1 min-w-0">
            <div className="flex justify-between items-start mb-1">
              <h4 className="font-semibold text-gray-900 truncate pr-2">{report.title}</h4>
            </div>
            <p className="text-xs text-gray-500 mb-1 flex items-center gap-1"><MapPin size={10} /> {report.address || 'Адрес не указан'}</p>
            <p className="text-sm text-gray-600 line-clamp-2 mb-2">{report.desc || 'Нет описания'}</p>

            {report.image && (
              <div className="w-full h-32 mb-3 rounded-lg overflow-hidden bg-gray-100 border border-gray-100">
                <img src={report.image} alt="Report attachment" className="w-full h-full object-cover" />
              </div>
            )}

            <div className="flex items-center justify-between mt-1">
              <Badge status={report.status} />
              <div className="text-xs text-gray-400 flex items-center gap-3">
                <span className="flex items-center gap-1 hover:text-blue-500"><ThumbsUp size={14} /> {report.likes}</span>
                <span className="flex items-center gap-1 hover:text-blue-500"><MessageCircle size={14} /> {report.comments}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    );

    // 3. Главный Экран
    const MapScreen = ({ user, onOpenProfile, onAddReport, reports }) => {
      const [selectedPoint, setSelectedPoint] = useState(null);
      const [activeReports, setActiveReports] = useState(null);
      const [isSheetOpen, setIsSheetOpen] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchHistory, setSearchHistory] = useState(['ул. Пушкина, 10', 'Парк Горького', 'Центральный рынок']);
      const [zoomLevel, setZoomLevel] = useState(1);

      const handleZoomIn = () => setZoomLevel(prev => Math.min(prev + 0.5, 3));
      const handleZoomOut = () => setZoomLevel(prev => Math.max(prev - 0.5, 1));
      const handleLocateMe = () => {
        setZoomLevel(1);
        alert("Ваше местоположение найдено (демо)");
      };

      const handleMapPress = (coords) => {
        setActiveReports(null);
        setSelectedPoint(coords);
        setIsSheetOpen(false);
      };

      const handleMarkerPress = (clusterReports) => {
        setSelectedPoint(null);
        setActiveReports(clusterReports);
        setIsSheetOpen(true);
      };

      const filteredReports = reports.filter(r =>
        r.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        (r.address && r.address.toLowerCase().includes(searchQuery.toLowerCase()))
      );
      const singleReport = activeReports && activeReports.length === 1 ? activeReports[0] : null;

      return (
        <div className="relative w-full h-full flex flex-col bg-white overflow-hidden">

          <div className="absolute inset-0 bottom-24"> {/* Больше места снизу для карты */}
            <MockMap
              markers={reports}
              onMapPress={handleMapPress}
              onMarkerPress={handleMarkerPress}
              zoomLevel={zoomLevel}
            />

            {selectedPoint && (
              <div className="absolute transform -translate-x-1/2 -translate-y-1/2 pointer-events-none"
                style={{ left: selectedPoint.x + '%', top: selectedPoint.y + '%' }}>
                <div className="w-12 h-12 rounded-full bg-blue-500/30 animate-ping absolute" />
                <MapPin size={48} className="text-blue-600 drop-shadow-xl relative -top-5" fill="white" />
              </div>
            )}

            {/* Профиль ВЛЕВО (Аватар) */}
            <button onClick={onOpenProfile}
              className="absolute top-12 left-4 w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center border border-gray-100 active:scale-95 z-10 hover:bg-gray-50 transition-colors text-2xl"
            >
              🧑‍💼
            </button>

            {/* Панель управления картой СПРАВА */}
            <div className="absolute top-1/2 right-4 -translate-y-1/2 flex flex-col gap-3 z-10">
              <button onClick={handleZoomIn} className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center border border-gray-100 active:scale-95 hover:bg-gray-50 transition-colors">
                <Plus size={24} className="text-gray-700" />
              </button>
              <button onClick={handleZoomOut} className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center border border-gray-100 active:scale-95 hover:bg-gray-50 transition-colors">
                <Minus size={24} className="text-gray-700" />
              </button>
              <button onClick={handleLocateMe} className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center border border-gray-100 active:scale-95 hover:bg-gray-50 transition-colors mt-4">
                <Locate size={24} className="text-blue-600" />
              </button>
            </div>

            {!selectedPoint && !activeReports && (
              <div className="absolute bottom-6 right-4 z-10">
                <button
                  onClick={() => handleMapPress({ x: 50, y: 50 })}
                  className="w-14 h-14 bg-blue-600 rounded-full shadow-xl flex items-center justify-center text-white hover:bg-blue-700 active:scale-95 transition-transform"
                >
                  <Plus size={32} />
                </button>
              </div>
            )}
          </div>

          {selectedPoint && (
            <div className="absolute bottom-0 w-full p-4 z-30 animate-in slide-in-from-bottom duration-300">
              <div className="bg-white p-5 rounded-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.1)] border border-gray-100">
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <h3 className="font-bold text-lg">Новая метка</h3>
                    <p className="text-gray-900 font-medium">ул. Примерная, д. {Math.floor(selectedPoint.x + selectedPoint.y)}</p>
                    <p className="text-gray-500 text-xs">Координаты: {selectedPoint.x.toFixed(1)}, {selectedPoint.y.toFixed(1)}</p>
                  </div>
                  <button onClick={() => setSelectedPoint(null)} className="p-2 bg-gray-100 rounded-full"><X size={20} /></button>
                </div>
                <Button title="Сообщить о проблеме" onPress={() => onAddReport(selectedPoint)} className="w-full mt-2" />
              </div>
            </div>
          )}

          {!selectedPoint && (
            <div
              className={`absolute bottom-0 w-full bg-white rounded-t-[30px] shadow-[0_-5px_30px_rgba(0,0,0,0.15)] z-20 transition-all duration-500 ease-in-out flex flex-col
                    ${isSheetOpen ? 'h-[85%]' : 'h-24 hover:h-26'}`}
            >
              <div className="w-full pt-3 pb-1 flex justify-center cursor-pointer" onClick={() => setIsSheetOpen(!isSheetOpen)}>
                <div className="w-12 h-1.5 bg-gray-300 rounded-full" />
              </div>

              <div className="flex-1 flex flex-col overflow-hidden">

                {/* ОДИНОЧНЫЙ ОТЧЕТ */}
                {singleReport ? (
                  <div className="p-5 flex-1 overflow-y-auto animate-in fade-in">
                    <div className="flex justify-between items-start">
                      <Badge status={singleReport.status} />
                      <button onClick={() => { setActiveReports(null); setIsSheetOpen(false); }} className="text-gray-400"><X size={24} /></button>
                    </div>

                    <h2 className="text-2xl font-bold mt-3 text-gray-900 leading-tight">{singleReport.title}</h2>

                    <div className="flex items-center gap-2 mt-3 mb-4 text-sm text-gray-500">
                      <div className="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xs">{singleReport.author.charAt(0)}</div>
                      <span className="font-medium text-gray-900">{singleReport.author}</span>
                      <span>•</span>
                      <span>{singleReport.date}</span>
                    </div>

                    <p className="text-sm text-gray-500 mb-2 flex items-center gap-1"><MapPin size={14} /> {singleReport.address || 'Адрес не указан'}</p>

                    {singleReport.image && (
                      <div className="w-full h-48 rounded-2xl overflow-hidden bg-gray-100 mb-4 border border-gray-200">
                        <img src={singleReport.image} className="w-full h-full object-cover" alt="Evidence" />
                      </div>
                    )}

                    <div className="bg-gray-50 p-4 rounded-xl mb-4 text-gray-700 leading-relaxed border border-gray-100">
                      {singleReport.desc || singleReport.title}
                    </div>

                    <div className="flex gap-3 mb-6">
                      <button className="flex-1 py-3 bg-blue-50 text-blue-600 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-blue-100 transition-colors">
                        <ThumbsUp size={18} /> Поддержать ({singleReport.likes})
                      </button>
                      <button className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-gray-200 transition-colors">
                        <MessageCircle size={18} /> Обсудить ({singleReport.comments})
                      </button>
                    </div>
                    <Button title="Проложить маршрут" variant="secondary" icon={Navigation} className="w-full" />
                  </div>

                  /* СПИСОК ЖАЛОБ (КЛАСТЕР) */
                ) : activeReports && activeReports.length > 1 ? (
                  <div className="flex-1 overflow-y-auto px-5 pb-5 animate-in fade-in">
                    <div className="flex justify-between items-center mb-4 sticky top-0 bg-white py-2 z-10 border-b border-gray-50 bg-opacity-95 backdrop-blur-sm">
                      <div>
                        <h3 className="font-bold text-lg">Жалобы по адресу</h3>
                        <p className="text-xs text-gray-500">{activeReports[0].address || 'Адрес не определен'}</p>
                      </div>
                      <button onClick={() => { setActiveReports(null); setIsSheetOpen(false); }} className="text-gray-400"><X size={24} /></button>
                    </div>

                    {/* Кнопка добавления жалобы в этот кластер */}
                    <Button
                      title="Добавить жалобу здесь"
                      icon={Plus}
                      className="w-full mb-4 py-2 text-sm"
                      onPress={() => onAddReport({ x: activeReports[0].long, y: activeReports[0].lat })}
                    />

                    <div className="space-y-4">
                      {activeReports.map(r => (
                        <ReportCard key={r.id} report={r} onClick={() => setActiveReports([r])} />
                      ))}
                    </div>
                  </div>

                  /* ГЛАВНАЯ ЛЕНТА + ИСТОРИЯ */
                ) : (
                  <React.Fragment>
                    <div className="px-5 pb-4">
                      <div className="relative">
                        <Search className="absolute left-3 top-3.5 text-gray-400" size={20} />
                        <input
                          type="text" placeholder="Поиск по адресу..."
                          className="w-full bg-gray-100 pl-10 pr-4 py-3 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-gray-900"
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          onFocus={() => setIsSheetOpen(true)}
                        />
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-5 pb-5">
                      {/* История поиска (только если нет активного запроса) */}
                      {!searchQuery && searchHistory.length > 0 && (
                        <div className="mb-6">
                          <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-gray-900 text-sm">История поиска</h3>
                            <button className="text-xs text-gray-400 hover:text-red-500 transition-colors" onClick={() => setSearchHistory([])}>Очистить</button>
                          </div>
                          <div className="flex flex-wrap gap-2">
                            {searchHistory.map((item, idx) => (
                              <button
                                key={idx}
                                className="px-3 py-1.5 bg-gray-100 rounded-lg text-sm text-gray-700 hover:bg-gray-200 transition-colors flex items-center gap-1.5"
                                onClick={() => setSearchQuery(item)}
                              >
                                <Clock size={12} className="text-gray-400" />
                                {item}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      <h3 className="font-bold text-gray-900 mb-3 text-lg">
                        {searchQuery ? 'Результаты поиска' : 'Лента происшествий'}
                      </h3>

                      <div className="space-y-4">
                        {filteredReports.map(report => (
                          <ReportCard
                            key={report.id}
                            report={report}
                            onClick={() => { setActiveReports([report]); setIsSheetOpen(true); }}
                          />
                        ))}
                        {filteredReports.length === 0 && <div className="text-center py-10 text-gray-400">Ничего не найдено</div>}
                      </div>
                    </div>
                  </React.Fragment>
                )}
              </div>
            </div>
          )}
        </div>
      );
    };

    // 4. Создание заявки
    const CreateReportScreen = ({ onClose, onSubmit }) => {
      const [category, setCategory] = useState(null);
      const [title, setTitle] = useState('');
      const [address, setAddress] = useState('');
      const [desc, setDesc] = useState('');

      const handleSubmit = () => {
        if (!category || !title) return alert('Заполните обязательные поля');
        onSubmit({ title, category, desc, address });
      };

      return (
        <div className="h-full bg-white flex flex-col animate-in slide-in-from-right duration-300">
          <div className="p-4 pt-12 border-b flex items-center justify-between bg-white z-10">
            <button onClick={onClose} className="p-2 -ml-2 rounded-full hover:bg-gray-100"><X size={24} /></button>
            <span className="font-bold text-lg">Новая заявка</span>
            <div className="w-8" />
          </div>

          <div className="flex-1 overflow-y-auto p-5">
            <label className="block text-sm font-bold text-gray-900 mb-3">1. Что случилось?</label>
            <div className="flex overflow-x-auto gap-3 pb-2 mb-6 scrollbar-hide -mx-5 px-5">
              {CATEGORIES.map(cat => (
                <button key={cat.id} onClick={() => setCategory(cat.id)}
                  className={`flex-shrink-0 w-20 flex flex-col items-center p-3 rounded-xl border transition-all ${category === cat.id ? 'bg-blue-50 border-blue-500 shadow-md' : 'bg-gray-50 border-transparent hover:bg-gray-100'}`}
                >
                  <div className="w-10 h-10 rounded-full flex items-center justify-center mb-2" style={{ backgroundColor: cat.color + '30' }}>
                    <span className="text-xl">{cat.icon}</span>
                  </div>
                  <span className="text-xs font-medium text-center truncate w-full">{cat.name}</span>
                </button>
              ))}
            </div>

            <label className="block text-sm font-bold text-gray-900 mb-3">2. Детали</label>

            <Input placeholder="Краткое название" value={title} onChangeText={setTitle} />
            <Input placeholder="Адрес (например: ул. Ленина, 10)" value={address} onChangeText={setAddress} />
            <Input placeholder="Подробное описание..." multiline={true} value={desc} onChangeText={setDesc} />

            <label className="block text-sm font-bold text-gray-900 mb-3">3. Фотография</label>
            <button className="w-full h-32 bg-gray-50 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center text-gray-400 hover:bg-gray-100"><Camera size={32} className="mb-2" /><span className="text-sm">Добавить фото</span></button>
            <div className="h-20" />
          </div>
          <div className="p-5 border-t bg-white safe-area-bottom"><Button title="Отправить" onPress={handleSubmit} className="w-full" /></div>
        </div>
      );
    };

    // 5. Профиль (Без изменений)
    const ProfileScreen = ({ user, reports, onClose }) => {
      const xp = 350; const nextLevelXp = 500; const progress = (xp / nextLevelXp) * 100;
      return (
        <div className="h-full bg-gray-50 flex flex-col animate-in slide-in-from-right duration-300">
          <div className="p-4 pt-12 bg-white flex items-center justify-between shadow-sm z-10">
            <button onClick={onClose} className="p-2 -ml-2 rounded-full hover:bg-gray-100"><X size={24} /></button>
            <span className="font-bold text-lg">Мой профиль</span><div className="w-8" />
          </div>
          <div className="flex-1 overflow-y-auto">
            <div className="bg-white p-6 m-4 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center text-center">
              <div className="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center text-4xl mb-4 border-2 border-white shadow-sm">🧑‍💼</div>
              <h2 className="text-xl font-bold mb-1">Алексей Н.</h2>
              <span className="text-blue-600 font-semibold text-sm mb-4">Уровень 5</span>
              <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden mb-2"><div className="h-full bg-green-500" style={{ width: `${progress}%` }} /></div>
              <span className="text-xs text-gray-400 mb-6">{xp} / {nextLevelXp} XP</span>
              <div className="flex w-full justify-between pt-4 border-t border-gray-50">
                <div className="flex-1"><div className="text-lg font-bold">12</div><div className="text-xs text-gray-400">Заявок</div></div>
                <div className="flex-1 border-l border-r border-gray-50"><div className="text-lg font-bold">8</div><div className="text-xs text-gray-400">Решено</div></div>
                <div className="flex-1"><div className="text-lg font-bold">🔥</div><div className="text-xs text-gray-400">Влияние</div></div>
              </div>
            </div>
            <h3 className="font-bold text-gray-900 px-6 mb-3 text-lg">Мои заявки</h3>
            <div className="px-4 pb-8 space-y-3">{reports.map(r => (
              <div key={r.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{ backgroundColor: (CATEGORIES.find(c => c.id === r.category)?.color || '#999') + '20' }}><span>!</span></div>
                <div className="flex-1 min-w-0"><h4 className="font-semibold text-gray-900 truncate">{r.title}</h4><p className="text-xs text-gray-400">{r.date}</p></div>
                <Badge status={r.status} />
              </div>
            ))}</div>
          </div>
        </div>
      );
    };

    // --- APP ROOT ---

    function App() {
      const [screen, setScreen] = useState('auth');
      const [myReports, setMyReports] = useState(MOCK_REPORTS);

      const submitReport = (data) => {
        const newReport = {
          id: Date.now(),
          lat: 50, long: 50,
          title: data.title, desc: data.desc, address: data.address,
          status: 'pending', category: data.category,
          date: new Date().toLocaleDateString(), author: 'Вы', likes: 0, comments: 0,
          image: null
        };
        setMyReports([newReport, ...myReports]);
        alert('Заявка отправлена!');
        setScreen('map');
      };

      return (
        <div className="flex items-center justify-center min-h-screen bg-gray-200 p-0 sm:p-4 font-sans text-gray-900">
          <div className="w-full sm:max-w-[400px] h-[100dvh] sm:h-[800px] bg-white sm:rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-gray-900/5 sm:border-gray-900">
            <div className="hidden sm:block absolute top-0 left-1/2 transform -translate-x-1/2 w-40 h-6 bg-gray-900 rounded-b-2xl z-50 pointer-events-none" />
            <div className="h-full w-full bg-gray-50">
              {screen === 'auth' && <AuthScreen onLogin={() => setScreen('map')} />}
              {screen === 'map' && <MapScreen reports={myReports} onOpenProfile={() => setScreen('profile')} onAddReport={(coords) => setScreen('create')} />}
              {screen === 'create' && <CreateReportScreen onClose={() => setScreen('map')} onSubmit={submitReport} />}
              {screen === 'profile' && <ProfileScreen reports={myReports} onClose={() => setScreen('map')} />}
            </div>
            <div className="absolute bottom-1 left-1/2 transform -translate-x-1/2 w-32 h-1 bg-gray-900/20 rounded-full pointer-events-none z-50" />
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
